<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--
        RUNNING HEAD (appears on every page except title page).
        Three-column flex layout: short title | blank | page number.
        
        data-short-title: iA Writer fills in your document's short title.
        data-page: iA Writer fills in the current page number.
        
        CUSTOMIZATION: If you want a different header, adjust the
        HTML structure below. The CSS class names are in style.css
        under "11. HEADER (running head)".
    -->
    <div class="header-container">
        <div class="header-left" data-short-title></div>
        <div class="header-center"></div>
        <div class="header-right" data-page></div>
    </div>
</body>
</html>
